<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radha Jaap</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
<div class="flowers">
    <span>🌸</span>
    <span>🌺</span>
    <span>🌸</span>
    <span>🌼</span>
    <span>🌸</span>
</div>

<div class="container">

    <h1>🌸 Radha Radha 🌸</h1>
    <p class="subtitle">Jaap Counter</p>

    <div class="counter-box">
        <h2 id="count">0</h2>
        <p>Total Jaap</p>
    </div>

    <button id="jaapBtn">
        🙏 Radha Radha
    </button>


    <div class="card">
        <h3>📿 Mala</h3>
        <p id="malaCount">0 / 108</p>
    </div>

<div class="card">
    <h3>🎯 Daily Goal</h3>

    <input id="goalInput" type="number" placeholder="Set Goal">

    <button id="setGoal" class="goal-btn">
    🎯 Set Daily Goal
</button>

    <p id="dailyGoal">0 / 108</p>

</div>


<div class="card">

<h3>📊 Progress</h3>

<div class="progress">
<div id="progressBar"></div>
</div>

<p id="progressText">0%</p>

</div>


<div class="card">

<h3>🏆 Lifetime Jaap</h3>

<p id="lifetime">0</p>

</div>
<div class="card">

<h3>📅 Daily History</h3>

<p id="todayDate"></p>

<p id="todayJaap">Aaj ka Jaap: 0</p>

</div>


<div class="card">

<h3>🔥 Brahmacharya Streak</h3>

<p id="streak">0 Days</p>

</div>
<div class="card">

<h3>📝 My Notes</h3>

<textarea id="notes" placeholder="Apne vichar likho..."></textarea>

<button id="saveNotes">
💾 Save Notes
</button>

</div>

<div class="card">

<h3>⚙️ Settings</h3>

<button onclick="resetApp()">
Reset All Data
</button>

</div>

<div class="card">

<h3>🔔 Daily Reminder</h3>

<button id="reminderBtn">
Enable Reminder
</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
